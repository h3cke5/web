    <video autoplay loop muted playsinline id="video-bg"></video>

            </div>
            
            <div class="player-controls-row">
                <div class="player-controls">
                    <button onclick="musicaAnterior()"><i class="fas fa-step-backward"></i></button>

                </div>

                <div class="volume-container">
                    <i class="fas fa-volume-up" id="volume-icon" onclick="toggleMute()"></i>
                    <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.01" value="0.5" oninput="ajustarVolume(this.value)">

            </div>
        </div>
